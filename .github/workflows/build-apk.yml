name: Build Burger Street APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Create Android TWA project
        run: |
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          cat > settings.gradle << 'EOF'
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              compileSdk 34
              namespace 'com.burgerstreet.inventory'
              defaultConfig {
                  applicationId "com.burgerstreet.inventory"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "5.0"
              }
              buildTypes {
                  release { minifyEnabled false }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_11
                  targetCompatibility JavaVersion.VERSION_11
              }
          }
          dependencies {
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET" />
            <application android:label="@string/app_name" android:icon="@drawable/ic_launcher" android:allowBackup="true">
              <activity android:name="com.google.androidbrowserhelper.trusted.LauncherActivity" android:exported="true">
                <meta-data android:name="android.support.customtabs.trusted.DEFAULT_URL" android:value="@string/launchUrl" />
                <meta-data android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR" android:resource="@color/colorPrimary" />
                <meta-data android:name="android.support.customtabs.trusted.FALLBACK_STRATEGY" android:value="customtabs" />
                <intent-filter>
                  <action android:name="android.intent.action.MAIN" />
                  <category android:name="android.intent.category.LAUNCHER" />
                </intent-filter>
                <intent-filter android:autoVerify="true">
                  <action android:name="android.intent.action.VIEW"/>
                  <category android:name="android.intent.category.DEFAULT" />
                  <category android:name="android.intent.category.BROWSABLE"/>
                  <data android:scheme="https" android:host="guileless-brioche-558e64.netlify.app" />
                </intent-filter>
              </activity>
              <service android:name="com.google.androidbrowserhelper.trusted.DelegationService" android:exported="true" android:enabled="true">
                <intent-filter>
                  <action android:name="android.support.customtabs.trusted.TRUSTED_WEB_ACTIVITY_SERVICE"/>
                  <category android:name="android.intent.category.DEFAULT"/>
                </intent-filter>
              </service>
            </application>
          </manifest>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <string name="app_name">Burger Street</string>
            <string name="launchUrl">https://guileless-brioche-558e64.netlify.app</string>
          </resources>
          EOF

          cat > app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <color name="colorPrimary">#e87c1e</color>
          </resources>
          EOF

          python3 -c "
          import struct, zlib
          def chunk(name, data):
              c = zlib.crc32(name + data) & 0xffffffff
              return struct.pack('>I', len(data)) + name + data + struct.pack('>I', c)
          w,h,r,g,b=192,192,232,124,30
          raw=b''.join(b'\x00'+bytes([r,g,b]*w) for _ in range(h))
          ihdr=struct.pack('>IIBBBBB',w,h,8,2,0,0,0)
          png=b'\x89PNG\r\n\x1a\n'+chunk(b'IHDR',ihdr)+chunk(b'IDAT',zlib.compress(raw))+chunk(b'IEND',b'')
          open('app/src/main/res/drawable/ic_launcher.png','wb').write(png)
          print('Icon created')
          "

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build APK
        run: gradle assembleRelease --no-daemon

      - name: Sign APK
        run: |
          keytool -genkey -v \
            -keystore burger.keystore \
            -alias burger \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass burgerstreet2026 \
            -keypass burgerstreet2026 \
            -dname "CN=Burger Street,O=BS,C=PH"
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign \
            --ks burger.keystore \
            --ks-pass pass:burgerstreet2026 \
            --key-pass pass:burgerstreet2026 \
            --ks-key-alias burger \
            --out burger-street-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BurgerStreet-APK
          path: burger-street-signed.apk
