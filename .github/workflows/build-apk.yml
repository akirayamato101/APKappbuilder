name: Build Burger Street APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK components
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools"
      - name: Create Bubblewrap config
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_SDK_ROOT\"}" > ~/.bubblewrap/config.json
      - name: Init TWA project
        run: |
          mkdir twa && cd twa
          bubblewrap init --manifest https://guileless-brioche-558e64.netlify.app/manifest.json --directory .
      - name: Generate keystore
        run: |
          cd twa
          keytool -genkey -v -keystore burger.keystore -alias burger -keyalg RSA -keysize 2048 -validity 10000 -storepass burgerstreet2026 -keypass burgerstreet2026 -dname "CN=Burger Street,O=BS,C=PH"
      - name: Build APK
        run: cd twa && bubblewrap build --skipPwaValidation
      - uses: actions/upload-artifact@v4
        with:
          name: BurgerStreet-APK
          path: twa/app-release-signed.apk
